services:
  - type: web
    name: coruscant-health-administration
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: bash render-start.sh
    healthCheckPath: /health/
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: coruscant-health-db
          property: connectionString
      - key: DOCUMENT_ENCRYPTION_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"

databases:
  - name: coruscant-health-db
