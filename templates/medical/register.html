{% extends "medical/base.html" %}

{% block title %}Register | CHA{% endblock %}

{% block content %}
<section class="panel form-panel">
    <p class="eyebrow">Register</p>
    <h1>Create a CHA account</h1>
    <p class="lead">Patient and doctor accounts need admin approval before full access is available.</p>
    <form method="post" class="grid two">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="form-actions full">
            <button class="button" type="submit">Create account</button>
        </div>
    </form>
</section>
{% endblock %}
